<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷诺曼手势抽卡 - 灵性空间</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #0a0a0c; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            #video-container { 
                bottom: 15px; 
                right: 10px; 
                width: 120px; 
                height: 90px; 
            }
            #gesture-hint { 
                bottom: 20px; 
                left: 10px; 
                right: 10px; 
                transform: none; 
            }
            .hint-bar { 
                font-size: 12px; 
                padding: 8px 16px; 
                justify-content: center; 
            }
            #header { 
                padding: 15px; 
            }
            #header h1 {
                font-size: 18px !important;
            }
            #draw-count { 
                top: 15px; 
                right: 15px; 
            }
            .draw-slot { 
                width: 10px; 
                height: 10px; 
            }
            #swipe-progress { 
                bottom: 60px; 
            }
            /* 标签选择页移动端 */
            .topic-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
                padding: 0 10px;
            }
            .topic-btn {
                padding: 12px 8px;
            }
            .topic-btn .icon {
                font-size: 24px;
            }
            .topic-btn .label {
                font-size: 12px;
            }
            /* 结果页移动端 */
            .result-cards-row {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .result-card-item {
                width: 90%;
                max-width: 280px;
                padding: 12px;
            }
            .connector-arrow {
                transform: rotate(90deg);
                margin: 5px 0;
            }
            .reading-panel {
                padding: 16px;
                margin: 0 10px;
            }
            .reading-panel h3 {
                font-size: 14px;
            }
            .reading-section p {
                font-size: 13px;
            }
            #reset-btn {
                padding: 10px 28px;
                font-size: 14px;
            }
            /* Loading移动端 */
            .crystal-ball {
                width: 80px;
                height: 80px;
            }
            .ball-outer {
                width: 70px;
                height: 70px;
            }
            .sand-container {
                width: 50px;
                height: 50px;
                top: 10px;
                left: 10px;
            }
            .glow-ring {
                width: 60px;
                height: 60px;
            }
            .glow-ring-2 {
                width: 45px;
                height: 45px;
            }
        }
        
        /* 更小屏幕 */
        @media (max-width: 480px) {
            #video-container {
                bottom: 10px;
                right: 8px;
                width: 100px;
                height: 75px;
            }
            .topic-title {
                font-size: 18px;
            }
            .topic-sub {
                font-size: 12px;
            }
        }
        
        #video-container { position: fixed; bottom: 20px; right: 20px; width: 200px; height: 150px; border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.15); z-index: 50; transform: scaleX(-1); }
        #video-element { width: 100%; height: 100%; object-fit: cover; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0c; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: #d4af37; }
        
        /* 水晶球动画 - 透明流沙旋转效果 */
        .crystal-ball {
            position: relative;
            width: 120px;
            height: 120px;
            perspective: 1000px;
        }
        .ball-outer {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(ellipse at 30% 30%,
                rgba(255,255,255,0.15) 0%,
                rgba(200,180,255,0.08) 30%,
                rgba(100,80,200,0.12) 60%,
                rgba(40,20,80,0.05) 100%);
            box-shadow:
                0 0 40px rgba(150,100,255,0.15),
                0 0 80px rgba(100,60,200,0.08),
                inset 0 0 30px rgba(255,255,255,0.05),
                inset -10px -10px 30px rgba(80,60,150,0.1);
            position: relative;
            animation: ball-float 4s ease-in-out infinite;
        }
        /* 流沙层 */
        .sand-container {
            position: absolute;
            width: 80px;
            height: 80px;
            top: 10px;
            left: 10px;
            border-radius: 50%;
            overflow: hidden;
            animation: sand-rotate 12s linear infinite;
        }
        .sand-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: linear-gradient(135deg, rgba(255,240,200,0.9), rgba(200,180,255,0.6));
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255,220,150,0.8);
        }
        /* 弥散光层 */
        .glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle,
                rgba(180,140,255,0.3) 0%,
                rgba(150,100,255,0.15) 40%,
                transparent 70%);
            animation: glow-pulse 3s ease-in-out infinite, glow-rotate 20s linear infinite;
            opacity: 0.8;
        }
        .glow-ring-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle,
                rgba(255,200,100,0.2) 0%,
                rgba(200,150,255,0.1) 50%,
                transparent 70%);
            animation: glow-pulse 3s ease-in-out infinite 1s, glow-rotate-reverse 15s linear infinite;
            opacity: 0.6;
        }
        .ball-inner {
            position: absolute;
            top: 15%;
            left: 15%;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(200,180,255,0.2), transparent 60%);
        }
        .ball-shine {
            position: absolute;
            top: 12%;
            left: 20%;
            width: 25%;
            height: 15%;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            filter: blur(4px);
            animation: shine-pulse 2.5s ease-in-out infinite;
        }
        .ball-base {
            width: 60px;
            height: 12px;
            background: radial-gradient(ellipse, rgba(80,60,120,0.5), transparent);
            margin: -5px auto 0;
            border-radius: 50%;
        }
        @keyframes ball-float {
            0%, 100% { transform: translateY(0) rotateX(5deg); }
            50% { transform: translateY(-12px) rotateX(-5deg); }
        }
        @keyframes sand-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes glow-rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes glow-rotate-reverse {
            from { transform: translate(-50%, -50%) rotate(360deg); }
            to { transform: translate(-50%, -50%) rotate(0deg); }
        }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.1); }
        }
        @keyframes shine-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .cursor-ring { position: fixed; width: 44px; height: 44px; border: 2px solid #d4af37; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); transition: all 0.15s; z-index: 1000; }
        .cursor-ring.swiping { width: 60px; height: 60px; border-color: #fff; background: rgba(212,175,55,0.2); box-shadow: 0 0 20px rgba(212,175,55,0.6); }

        /* 手势提示条 */
        #gesture-hint { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 20; pointer-events: none; display: none; }
        .hint-bar { background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); border: 1px solid rgba(212,175,55,0.3); border-radius: 999px; padding: 10px 24px; color: #d4af37; font-size: 14px; letter-spacing: 0.05em; display: flex; align-items: center; gap: 10px; }
        .hint-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: #d4af37; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

        /* 滑动进度弧 */
        #swipe-progress { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 20; pointer-events: none; transition: opacity 0.3s; opacity: 0; }

        /* 结果覆盖层 */
        #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 30; background: rgba(5,3,12,0.92); backdrop-filter: blur(12px); display: none; flex-direction: column; align-items: center; padding: 24px 20px 20px; overflow-y: auto; }
        #result-overlay.visible { display: flex; }

        .result-cards-row { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
        .result-card-item { background: linear-gradient(160deg,#1a1230,#0d0a1a); border: 1px solid rgba(212,175,55,0.5); border-radius: 14px; padding: 16px 14px; width: 180px; text-align: center; flex-shrink: 0; position: relative; }
        .result-card-item .position-label { font-size: 11px; letter-spacing: 0.1em; color: rgba(212,175,55,0.6); margin-bottom: 8px; text-transform: uppercase; }
        .result-card-item .card-emoji { font-size: 52px; line-height: 1; margin-bottom: 10px; }
        .result-card-item .card-number { font-size: 12px; color: rgba(212,175,55,0.5); margin-bottom: 4px; }
        .result-card-item .card-title { font-size: 15px; font-weight: bold; color: #f0d060; margin-bottom: 6px; }
        .result-card-item .card-keyword { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; }
        .connector-arrow { color: rgba(212,175,55,0.5); font-size: 22px; align-self: center; flex-shrink: 0; }

        .reading-panel { background: rgba(20,15,35,0.7); border: 1px solid rgba(212,175,55,0.2); border-radius: 16px; padding: 22px 24px; max-width: 700px; width: 100%; }
        .reading-panel h3 { color: #d4af37; font-size: 16px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .reading-section { margin-bottom: 16px; }
        .reading-section .section-label { font-size: 12px; color: rgba(212,175,55,0.6); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
        .reading-section p { color: rgba(240,230,210,0.85); font-size: 14px; line-height: 1.8; }

        #reset-btn { margin-top: 20px; padding: 12px 36px; background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.5); border-radius: 999px; color: #d4af37; font-size: 15px; cursor: pointer; letter-spacing: 0.08em; transition: all 0.2s; }
        #reset-btn:hover { background: rgba(212,175,55,0.3); box-shadow: 0 0 20px rgba(212,175,55,0.3); }

        /* 场景标签选择页 */
        #topic-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0c; z-index: 180;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        #topic-screen.visible { display: flex; }
        
        .topic-title {
            font-size: 22px; color: #f0d060; letter-spacing: 0.12em;
            margin-bottom: 8px; text-align: center;
        }
        .topic-sub {
            font-size: 14px; color: rgba(212,175,55,0.5); letter-spacing: 0.08em;
            margin-bottom: 28px; text-align: center;
        }
        
        .topic-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
            max-width: 520px; width: 100%; margin-bottom: 28px;
        }
        .topic-btn {
            background: rgba(26,18,48,0.8); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 14px; padding: 16px 12px; cursor: pointer;
            transition: all 0.25s; display: flex; flex-direction: column; align-items: center;
            gap: 8px;
        }
        .topic-btn:hover {
            background: rgba(42,29,80,0.9); border-color: rgba(212,175,55,0.6);
            transform: translateY(-2px);
        }
        .topic-btn.selected {
            background: linear-gradient(160deg, #2a1d50, #1a1230);
            border-color: #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.3);
        }
        .topic-btn .icon { font-size: 28px; }
        .topic-btn .label { font-size: 14px; color: #d4af37; letter-spacing: 0.05em; }
        
        .topic-confirm-btn {
            padding: 14px 48px; background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.5); border-radius: 999px;
            color: #d4af37; font-size: 16px; cursor: pointer;
            letter-spacing: 0.1em; transition: all 0.2s;
            opacity: 0.5; pointer-events: none;
        }
        .topic-confirm-btn.active {
            opacity: 1; pointer-events: auto;
        }
        .topic-confirm-btn:hover {
            background: rgba(212,175,55,0.3); box-shadow: 0 0 25px rgba(212,175,55,0.4);
        }

        /* 欢迎引导页 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0c; z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        #intro-screen.fade-out { opacity: 0; pointer-events: none; }

        .intro-orb {
            width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fff8dc, #d4af37 40%, #6b3fa0 80%, #1a0a2e);
            box-shadow: 0 0 40px rgba(212,175,55,0.5), 0 0 80px rgba(107,63,160,0.3);
            animation: orb-breathe 2s ease-in-out infinite;
            margin-bottom: 36px;
        }
        @keyframes orb-breathe {
            0%,100% { transform: scale(1);   box-shadow: 0 0 40px rgba(212,175,55,0.5), 0 0 80px rgba(107,63,160,0.3); }
            50%      { transform: scale(1.08); box-shadow: 0 0 60px rgba(212,175,55,0.8), 0 0 120px rgba(107,63,160,0.5); }
        }

        .intro-question {
            font-size: 22px; letter-spacing: 0.12em; color: #f0d060;
            margin-bottom: 12px; opacity: 0;
            animation: fade-in-up 0.7s ease 0.3s forwards;
        }
        .intro-sub {
            font-size: 14px; color: rgba(212,175,55,0.5); letter-spacing: 0.08em;
            opacity: 0; animation: fade-in-up 0.7s ease 0.6s forwards;
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 倒计时进度环 */
        .intro-timer-wrap {
            margin-top: 40px; position: relative; width: 64px; height: 64px;
            opacity: 0; animation: fade-in-up 0.7s ease 0.9s forwards;
        }
        .intro-timer-svg { transform: rotate(-90deg); }
        .intro-timer-track { fill: none; stroke: rgba(212,175,55,0.12); stroke-width: 3; }
        .intro-timer-ring  {
            fill: none; stroke: #d4af37; stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 163; stroke-dashoffset: 163;
            transition: stroke-dashoffset 0.05s linear;
        }
        .intro-timer-num {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #d4af37; font-size: 22px; font-weight: 300; letter-spacing: 0.02em;
        }

        /* header */
        #header { position: fixed; top: 0; left: 0; width: 100%; z-index: 20; padding: 22px 28px; pointer-events: none; display: none; }
        #draw-count { position: fixed; top: 22px; right: 28px; z-index: 20; display: none; gap: 8px; }
        .draw-slot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(212,175,55,0.5); transition: all 0.3s; }
        .draw-slot.filled { background: #d4af37; box-shadow: 0 0 8px rgba(212,175,55,0.8); border-color: #d4af37; }
    </style>
</head>
<body>

    <!-- 流星雨层：在 Three.js canvas(z=0) 之上、UI(z=20)之下 -->
    <canvas id="meteor-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;"></canvas>

    <!-- 欢迎引导页 -->
    <div id="intro-screen">
        <div class="intro-orb"></div>
        <div class="intro-question">心里默想你的问题</div>
        <div class="intro-sub">3 秒后进入灵性空间</div>
        <div class="intro-timer-wrap">
            <svg class="intro-timer-svg" width="64" height="64" viewBox="0 0 64 64">
                <circle class="intro-timer-track" cx="32" cy="32" r="26"/>
                <circle class="intro-timer-ring" id="intro-ring" cx="32" cy="32" r="26"/>
            </svg>
            <div class="intro-timer-num" id="intro-num">3</div>
        </div>
    </div>

    <div id="loading" class="loading-overlay">
        <div class="crystal-ball">
            <div class="ball-outer">
                <div class="glow-ring"></div>
                <div class="glow-ring-2"></div>
                <div class="sand-container" id="sand-container"></div>
                <div class="ball-inner"></div>
                <div class="ball-shine"></div>
            </div>
            <div class="ball-base"></div>
        </div>
        <div class="text-xl animate-pulse mt-4">正在链接灵性维度与摄像头...</div>
        <div class="text-sm text-gray-500 mt-3">请允许摄像头权限</div>
    </div>

    <!-- 场景标签选择页 -->
    <div id="topic-screen">
        <div class="topic-title">选择你的占卜场景</div>
        <div class="topic-sub">不同场景解读侧重点不同</div>
        <div class="topic-grid" id="topic-grid"></div>
        <button class="topic-confirm-btn" id="topic-confirm" onclick="confirmTopic()">开始占卜</button>
    </div>

    <div id="header">
        <h1 class="text-2xl font-light tracking-widest text-white opacity-70">LENORMAND ORACLE</h1>
        <p class="text-gray-500 text-sm mt-1">将手从画面下方向上滑动，召唤命运的指引</p>
    </div>

    <div id="draw-count">
        <div class="draw-slot" id="slot-0"></div>
        <div class="draw-slot" id="slot-1"></div>
        <div class="draw-slot" id="slot-2"></div>
    </div>

    <div id="video-container">
        <video id="video-element" autoplay playsinline></video>
    </div>

    <div id="gesture-hint">
        <div class="hint-bar">
            <span class="dot"></span>
            <span id="hint-text">手掌翻动抽卡 · 已选 <span id="hint-count">0</span>/3 张</span>
        </div>
        <div style="text-align:center;margin-top:8px;font-size:12px;color:rgba(212,175,55,0.45);letter-spacing:0.06em;">
            点击空白处随机抽取 3 张
        </div>
    </div>

    <svg id="swipe-progress" width="120" height="20">
        <rect x="0" y="6" width="120" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
        <rect id="progress-bar" x="0" y="6" width="0" height="8" rx="4" fill="#d4af37"/>
        <text x="60" y="20" text-anchor="middle" fill="rgba(212,175,55,0.7)" font-size="10">↑ 继续上滑抽卡</text>
    </svg>

    <div id="cursor" class="cursor-ring"></div>

    <!-- 结果页 -->
    <div id="result-overlay">
        <h2 style="color:#d4af37;font-size:20px;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:20px;">✦ 命运三牌阵 ✦</h2>
        <div class="result-cards-row" id="result-cards-row"></div>
        <div class="reading-panel" id="reading-panel">
            <h3 style="gap:8px;">☽ &nbsp;三牌联合解读</h3>
            <div class="reading-section">
                <div class="section-label">过去 · 根源</div>
                <p id="read-past"></p>
            </div>
            <div class="reading-section">
                <div class="section-label">现在 · 核心</div>
                <p id="read-present"></p>
            </div>
            <div class="reading-section">
                <div class="section-label">未来 · 走向</div>
                <p id="read-future"></p>
            </div>
            <div class="reading-section" style="border-top:1px solid rgba(212,175,55,0.15);padding-top:14px;margin-top:4px;">
                <div class="section-label">整体启示</div>
                <p id="read-overall"></p>
            </div>
        </div>
        <button id="reset-btn" onclick="resetAll()">重新占卜</button>
    </div>

    <script>
    // ─── 塔罗高频占卜场景标签 ─────────────────────────────────────────────
    const TOPICS = [
        { id: 'love',    icon: '💕', label: '爱情感情', category: '感情', keywords: ['爱情', '伴侣', '缘分', '情感'] },
        { id: 'career',  icon: '💼', label: '事业发展', category: '事业', keywords: ['工作', '晋升', '创业', '事业'] },
        { id: 'study',   icon: '📚', label: '学业考试', category: '学业', keywords: ['学业', '考试', '学习', '升学'] },
        { id: 'finance', icon: '💰', label: '财运投资', category: '财运', keywords: ['财富', '投资', '收入', '财务'] },
        { id: 'health',  icon: '💪', label: '健康平安', category: '健康', keywords: ['健康', '身体', '康复', '养生'] },

    const CARD_EMOJIS = [

    // ─── Three.js ────────────────────────────────────────────────────────
    let scene, camera, renderer, cardsGroup, particles;
    let drawnCards = [];       // 已抽出的三张牌 mesh
    let isAnimating = false;
    const DRAW_NEEDED = 3;

    // 跑马灯参数
    const CARD_SPACING = window.innerWidth < 768 ? 1.6 : 2.1;
    const SCROLL_SPEED = 0.022;
    const VISIBLE_HALF_WIDTH = window.innerWidth < 768 ? 8 : 12;
    // 淡出区间：牌进入 FADE_START ~ FADE_END 时透明度从1→0
    const FADE_START = -9.5;
    const FADE_END   = -12.5;
    let totalCardWidth = 0;

    // 鼠标交互
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-9999, -9999);

    let marqueesPaused = false;  // hover 时暂停跑马灯

    // 绘制卡牌正面 canvas（支持 glow 高亮模式）
    function drawCardFace(cardData, i, glow = false) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 384;
        const ctx = canvas.getContext('2d');

        if (glow) {
            // 高亮背景
            const grad = ctx.createLinearGradient(0,0,0,384);
            grad.addColorStop(0,'#2a1d50'); grad.addColorStop(1,'#18103a');
            ctx.fillStyle = grad; ctx.fillRect(0,0,256,384);
            // 发光边框
            ctx.shadowColor = '#d4af37';
            ctx.shadowBlur = 28;
            ctx.strokeStyle = '#ffe97a'; ctx.lineWidth = 8; ctx.strokeRect(8,8,240,368);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,220,100,0.6)'; ctx.lineWidth = 2; ctx.strokeRect(16,16,224,352);
        } else {
            const grad = ctx.createLinearGradient(0,0,0,384);
            grad.addColorStop(0,'#1a1230'); grad.addColorStop(1,'#0d0a1a');
            ctx.fillStyle = grad; ctx.fillRect(0,0,256,384);
            ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 8; ctx.strokeRect(8,8,240,368);
            ctx.strokeStyle = 'rgba(212,175,55,0.3)'; ctx.lineWidth = 2; ctx.strokeRect(16,16,224,352);
        }

        ctx.fillStyle = glow ? '#ffe97a' : '#d4af37';
        ctx.font = 'bold 26px serif'; ctx.textAlign = 'center';
        ctx.fillText(cardData.id, 128, 50);
        ctx.font = '88px Arial'; ctx.fillText(CARD_EMOJIS[i], 128, 192);
        ctx.strokeStyle = glow ? 'rgba(255,220,100,0.6)' : 'rgba(212,175,55,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(30,240); ctx.lineTo(226,240); ctx.stroke();
        ctx.fillStyle = '#f0d060'; ctx.font = 'bold 17px serif';
        ctx.fillText(cardData.name, 128, 274);
        ctx.fillStyle = glow ? 'rgba(255,220,100,0.8)' : 'rgba(212,175,55,0.55)';
        ctx.font = '12px Arial';
        ctx.fillText(cardData.en, 128, 296);
        return canvas;
    }

    function makeCardMesh(cardData, i) {
        const geometry = new THREE.BoxGeometry(1.5, 2.2, 0.05);

        const frontMat = new THREE.MeshPhongMaterial({
            map: new THREE.CanvasTexture(drawCardFace(cardData, i, false)),
            transparent: true
        });
        const frontMatGlow = new THREE.MeshPhongMaterial({
            map: new THREE.CanvasTexture(drawCardFace(cardData, i, true)),
            transparent: true,
            emissive: new THREE.Color(0x3a2800),
            emissiveIntensity: 0.6
        });

        // 背面
        const bCanvas = document.createElement('canvas');
        bCanvas.width = 256; bCanvas.height = 384;
        const bCtx = bCanvas.getContext('2d');
        const bGrad = bCtx.createLinearGradient(0,0,256,384);
        bGrad.addColorStop(0,'#1a1230'); bGrad.addColorStop(1,'#0d0a1a');
        bCtx.fillStyle = bGrad; bCtx.fillRect(0,0,256,384);
        bCtx.strokeStyle = '#d4af37'; bCtx.lineWidth = 8; bCtx.strokeRect(8,8,240,368);
        bCtx.font = '78px Arial'; bCtx.textAlign = 'center';
        bCtx.fillStyle = 'rgba(212,175,55,0.25)'; bCtx.fillText('🔮', 128, 218);

        const backMat = new THREE.MeshPhongMaterial({
            map: new THREE.CanvasTexture(bCanvas),
            transparent: true
        });
        const sideMat = new THREE.MeshPhongMaterial({ color: 0x2a1f4a, transparent: true });

        // 跑马灯只显示背面，抽取时才翻转显示正面
        // 摄像机在 z>0 看向 -z 方向，所以 index 4 是朝向摄像机的面
        // 我们把背面放在 index 4，这样跑马灯默认显示背面
        const mesh = new THREE.Mesh(geometry, [
            sideMat, sideMat, sideMat, sideMat,
            backMat,   // 初始朝向摄像机显示背面
            frontMat   // 背朝摄像机显示正面（备用）
        ]);
        mesh.userData = {
            ...cardData, index: i,
            _baseRotZ: 0, _baseRotY: 0,
            _frontMat: frontMat,
            _frontMatGlow: frontMatGlow,
            _sideMat: sideMat,
            _backMat: backMat
        };
        return mesh;
    }

    // 缓存 lerp 目标，避免每帧 new Vector3
    const _scaleHov  = new THREE.Vector3(1.22, 1.22, 1.22);
    const _scaleNorm = new THREE.Vector3(1, 1, 1);

    // 设置一张牌所有材质的透明度（只在值变化时写入）
    function setMeshOpacity(mesh, opacity) {
        mesh.material.forEach(m => {
            if (m.opacity !== opacity) m.opacity = opacity;
        });
    }

    // 切换 hover 高亮材质（只在状态变化时执行，避免每帧替换）
    // 修改：跑马灯hover时保持背面，只在抽取动画时才切换正面
    function setMeshGlow(mesh, on) {
        if (mesh.userData._glowOn === on) return;
        mesh.userData._glowOn = on;
        // 跑马灯阶段保持背面，不切换到正面
        // 只有在抽取动画中才切换到正面
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0c, 0.02);
        // 移动端调整相机视野
        const isMobile = window.innerWidth < 768;
        camera = new THREE.PerspectiveCamera(isMobile ? 85 : 70, innerWidth/innerHeight, 0.1, 1000);
        camera.position.z = isMobile ? 10 : 14;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(devicePixelRatio);
        Object.assign(renderer.domElement.style, { position:'fixed', top:'0', left:'0', zIndex:'0' });
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const pl = new THREE.PointLight(0xd4af37, 1.5, 60);
        pl.position.set(5, 5, 10); scene.add(pl);
        const bl = new THREE.PointLight(0x4a90d9, 0.7, 40);
        bl.position.set(-8, -4, 8); scene.add(bl);

        cardsGroup = new THREE.Group();
        scene.add(cardsGroup);

        const total = LENORMAND_CARDS.length;
        totalCardWidth = total * CARD_SPACING;
        // 随机乱序排列卡牌
        const cardIndices = Array.from({length: total}, (_, i) => i);
        // Fisher-Yates 洗牌算法
        for (let i = cardIndices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardIndices[i], cardIndices[j]] = [cardIndices[j], cardIndices[i]];
        }
        cardIndices.forEach((origIndex, i) => {
            const mesh = makeCardMesh(LENORMAND_CARDS[origIndex], origIndex);
            mesh.position.x = (i - total / 2) * CARD_SPACING;
            mesh.rotation.z = (Math.random() - 0.5) * 0.12;
            mesh.rotation.y = (Math.random() - 0.5) * 0.06;
            mesh.userData._baseRotZ = mesh.rotation.z;
            mesh.userData._baseRotY = mesh.rotation.y;
            cardsGroup.add(mesh);
        });

        // 粒子
        const pGeo = new THREE.BufferGeometry();
        const pos = new Float32Array(600 * 3);
        for (let j = 0; j < 600*3; j++) pos[j] = (Math.random()-0.5)*50;
        pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color:0xd4af37, size:0.055, transparent:true, opacity:0.45 }));
        scene.add(particles);

        // 鼠标事件
        renderer.domElement.addEventListener('mousemove', onMouseMove);
        renderer.domElement.addEventListener('click', onMouseClick);

        animate();
    }

    // 鼠标移动：更新 raycaster 坐标
    function onMouseMove(e) {
        mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
        mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    }

    // 鼠标点击
    function onMouseClick(e) {
        if (drawnCards.length >= DRAW_NEEDED || isAnimating) return;
        raycaster.setFromCamera(mouse, camera);
        const cardMeshes = cardsGroup.children;
        const hits = raycaster.intersectObjects(cardMeshes);
        if (hits.length > 0) {
            // 点击到具体卡牌
            const mesh = hits[0].object;
            const drawnIds = new Set(drawnCards.map(m => m.userData.id));
            if (!drawnIds.has(mesh.userData.id)) {
                animateDrawCard(mesh, drawnCards.length);
            }
        } else {
            // 点击空白区域 → 随机抽（只有在确认场景后才允许）
            if (topicConfirmed) {
                handleSwipeUp();
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = Date.now() * 0.001;

        if (drawnCards.length < DRAW_NEEDED) {
            // Raycaster hover 检测（每帧只做一次）
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(cardsGroup.children, false);
            const newHovered = hits.length > 0 ? hits[0].object : null;

            if (hoveredMesh !== newHovered) {
                // 状态变化时才操作
                if (hoveredMesh) setMeshGlow(hoveredMesh, false);
                hoveredMesh = newHovered;
                marqueesPaused = !!hoveredMesh;
                document.body.style.cursor = hoveredMesh ? 'pointer' : 'default';
            }

            // 跑马灯：持续移动，经过中心时放大
            if (!marqueesPaused) {
                cardsGroup.children.forEach(mesh => {
                    mesh.position.x -= SCROLL_SPEED;
                    if (mesh.position.x < -VISIBLE_HALF_WIDTH - 1) {
                        mesh.position.x += totalCardWidth;
                    }
                });
            }

            // 每张牌：淡出
            cardsGroup.children.forEach(mesh => {
                const wx = cardsGroup.position.x + mesh.position.x; // 世界 X 近似
                // 淡出：进入淡出区间后透明度线性降为 0
                let opacity = 1;
                if (wx < FADE_START) {
                    opacity = Math.max(0, (wx - FADE_END) / (FADE_START - FADE_END));
                }
                setMeshOpacity(mesh, opacity);
            });

            // 整体漂浮
            cardsGroup.position.y = Math.sin(t * 0.45) * 0.22;
            cardsGroup.rotation.x = Math.sin(t * 0.28) * 0.025;
            cardsGroup.rotation.y = 0;
            cardsGroup.rotation.z = 0;
        }

        particles.rotation.y += 0.0003;
        particles.rotation.x += 0.0001;
        renderer.render(scene, camera);
    }

    // ─── 手势识别 ──────────────────────────────────────────────────────────
    const videoElement = document.getElementById('video-element');
    const cursorEl    = document.getElementById('cursor');
    const loadingEl   = document.getElementById('loading');

    // ── 手势状态：检测手掌翻转动作 ──
    // 原理：检测手掌从朝下（手背朝前）转变为朝上（掌心朝前）
    // 使用食指和中指的关键点来判断手掌方向
    const SWIPE_COOLDOWN_MS = 1500;      // 触发后冷却，避免连续触发

    let handOrientation = null;  // 'down'(朝下/手背朝前) 或 'up'(朝上/掌心朝前)
    let swipeCooldown = false;
    let swipeReady = false;

    const hands = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.65, minTrackingConfidence:0.6 });
    hands.onResults(onHandResults);

    function onHandResults(results) {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            
            // 使用食指指尖(8)和中指指尖(9)与对应指根(6,7)来判断手掌方向
            // 如果指尖y值 > 指根y值，说明手指朝下（手背朝前）
            // 如果指尖y值 < 指根y值，说明手指朝上（掌心朝前）
            const indexTipY = lm[8].y;
            const indexMCPY = lm[5].y;
            const middleTipY = lm[12].y;
            const middleMCPY = lm[9].y;
            
            // 计算平均手指方向
            const fingersDown = (indexTipY > indexMCPY ? 1 : 0) + (middleTipY > middleMCPY ? 1 : 0);
            // 如果至少2个手指朝下，认为是手掌朝下
            const isHandDown = fingersDown >= 1;
            
            // 镜像 X 显示光标（使用手腕位置）
            const wrist = lm[0];
            const cx = (1 - wrist.x) * innerWidth;
            const cy = wrist.y * innerHeight;
            cursorEl.style.left = `${cx}px`;
            cursorEl.style.top  = `${cy}px`;

            // 检测手掌翻转：从朝下转变为朝上时触发
            if (handOrientation === 'down' && !isHandDown && !swipeCooldown) {
                // 检测到手掌从朝下转变为朝上
                swipeCooldown = true;
                cursorEl.classList.add('swiping');
                setTimeout(() => {
                    cursorEl.classList.remove('swiping');
                    swipeCooldown = false;
                }, SWIPE_COOLDOWN_MS);
                handleSwipeUp();
            }
            
            // 更新手掌方向状态
            handOrientation = isHandDown ? 'down' : 'up';
            swipeReady = true;
        } else {
            // 手消失，重置状态
            if (swipeReady) {
                handOrientation = null;
                swipeReady = false;
            }
            cursorEl.style.left = '-100px';
            cursorEl.style.top  = '-100px';
        }
    }

    function updateSwipeUI(p) {
        // 已简化手势，进度条隐藏
        document.getElementById('swipe-progress').style.opacity = '0';
    }

    // 上滑 → 随机抽一张未被抽过的牌（从 cardsGroup 当前可见区域附近随机选）
    function handleSwipeUp() {
        if (drawnCards.length >= DRAW_NEEDED || isAnimating) return;

        const drawnIds = new Set(drawnCards.map(m => m.userData.id));
        const pool = cardsGroup.children.filter(m => !drawnIds.has(m.userData.id));
        if (pool.length === 0) return;

        const randomMesh = pool[Math.floor(Math.random() * pool.length)];
        animateDrawCard(randomMesh, drawnCards.length);
    }

    // ─── 抽卡动画 ─────────────────────────────────────────────────────────
    // 三张牌的目标位置（中间偏上，左中右排列）
    function getTargetPos(slotIndex) {
        const isMobile = window.innerWidth < 768;
        const offsetX = isMobile ? 2.0 : 3.0;
        const offsets = [-offsetX, 0, offsetX];
        const yPos = isMobile ? 1.5 : 2.2;
        const zPos = isMobile ? 5 : 7;
        return new THREE.Vector3(offsets[slotIndex], yPos, zPos);
    }

    function animateDrawCard(mesh, slotIndex) {
        isAnimating = true;
        drawnCards.push(mesh);

        // 让它脱离 cardsGroup，加入 scene 以独立运动
        const worldPos = new THREE.Vector3();
        mesh.getWorldPosition(worldPos);
        const worldQuat = new THREE.Quaternion();
        mesh.getWorldQuaternion(worldQuat);
        cardsGroup.remove(mesh);
        scene.add(mesh);
        mesh.position.copy(worldPos);
        mesh.quaternion.copy(worldQuat);

        const startPos  = mesh.position.clone();
        const targetPos = getTargetPos(slotIndex);
        
        // 目标旋转：Y轴翻转180°，让正面朝向摄像机
        // 因为现在背面在 index 4（朝向摄像机），所以需要翻转显示正面
        const flipQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, Math.PI, 0));

        let revealed = false;
        let p = 0;
        const dur = 75;
        function step() {
            p++;
            const t = easeInOut(p / dur);
            mesh.position.lerpVectors(startPos, targetPos, t);
            // 使用翻转四元数让正面朝向摄像机
            THREE.Quaternion.slerp(worldQuat, flipQuat, mesh.quaternion, t);
            const s = 1 + Math.sin(t * Math.PI) * 0.25;
            mesh.scale.set(s, s, s);
            
            // 动画过半时切换到正面材质
            if (!revealed && t >= 0.5) {
                revealed = true;
                // 交换材质：现在 index 4 放正面材质
                const mat = mesh.material.slice();
                mat[4] = mesh.userData._frontMat;
                mesh.material = mat;
            }
            
            if (p < dur) {
                requestAnimationFrame(step);
            } else {
                mesh.scale.set(1.1, 1.1, 1.1);
                isAnimating = false;
                updateDrawUI(slotIndex);
                if (drawnCards.length === DRAW_NEEDED) {
                    setTimeout(showResult, 800);
                }
            }
        }
        step();
    }

    function updateDrawUI(slotIndex) {
        document.getElementById(`slot-${slotIndex}`).classList.add('filled');
        document.getElementById('hint-count').textContent = drawnCards.length;
        if (drawnCards.length >= DRAW_NEEDED) {
            document.getElementById('gesture-hint').style.opacity = '0';
        }
    }

    function easeInOut(t) {
        return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    }

    // ─── 结果页 ───────────────────────────────────────────────────────────
    const POSITIONS = ["过去·根源", "现在·核心", "未来·走向"];

    function generateReading(cards) {
        // 基于三张牌的关键词和选择的场景生成解读文本
        const [c1, c2, c3] = cards;
        const kw = (c) => c.keywords.join('、');
        
        // 获取场景信息
        const topicData = TOPICS.find(t => t.id === selectedTopic);
        
        // 根据场景调整解读
        let pastContext = '';
        let presentContext = '';
        let futureContext = '';
        
        if (topicData) {
            pastContext = `关于你的${topicData.label}，`;
            presentContext = `在你关注的${topicData.label}领域，`;
            futureContext = `对于你${topicData.label}的未来发展，`;
        }

        const past = `${pastContext}${c1.name}（${c1.en}）携带着"${kw(c1)}"的能量，暗示过去的经历塑造了当前的处境。${c1.desc}这段过去的经历是理解现状的重要线索。`;

        const present = `${presentContext}${c2.name}（${c2.en}）占据核心位置，以"${kw(c2)}"为主题贯穿当下。${c2.desc}此刻你正处于这种能量的中心，它深刻影响着你的每个决定。`;

        const future = `${futureContext}${c3.name}（${c3.en}）指向前方，"${kw(c3)}"将是你即将遇见的主要力量。${c3.desc}顺应或有意识地应对这股能量，将是关键所在。`;

        // 三牌联合解读（带场景关联）
        const combo = generateComboReading(c1, c2, c3);

        return { past, present, future, overall: combo };
    }

    function generateComboReading(c1, c2, c3) {
        // 组合能量评估
        const positiveCards = new Set([2,9,13,16,18,24,25,31,32,33,34,35]);
        const challengeCards = new Set([6,7,8,10,11,21,23,36]);

        const scores = [c1,c2,c3].map(c => positiveCards.has(c.id) ? 1 : challengeCards.has(c.id) ? -1 : 0);
        const total = scores.reduce((a,b) => a+b, 0);

        let tone;
        if (total >= 2)       tone = "整体牌阵散发出积极的振动，宇宙正向你敞开大门。";
        else if (total === 1) tone = "牌阵呈现出挑战中蕴藏机遇的复杂格局。";
        else if (total === 0) tone = "牌阵处于平衡状态，结果取决于你如何把握。";
        else if (total === -1) tone = "牌阵中挑战的能量较强，但每次考验都是蜕变的契机。";
        else                  tone = "牌阵揭示出深刻的转化时期，需要勇气与智慧共同应对。";

        // 添加场景专属建议
        let topicAdvice = '';
        if (selectedTopic && TOPIC_WEIGHTS[selectedTopic]) {
            const tw = TOPIC_WEIGHTS[selectedTopic];
            const cardIds = [c1.id, c2.id, c3.id];
            const matches = cardIds.filter(id => tw.positive.includes(id));
            const challenges = cardIds.filter(id => tw.negative.includes(id));
            const currentTopic = TOPICS.find(t => t.id === selectedTopic);
            
            if (matches.length >= 2) {
                topicAdvice = `\n\n✨ 针对你选择的「${currentTopic?.label}」领域，这组牌显示出有利的能量流动，把握当下会有好的收获。`;
            } else if (challenges.length >= 2) {
                topicAdvice = `\n\n💡 在「${currentTopic?.label}」领域，这组牌提示你需要谨慎应对可能的挑战，保持清醒和耐心。`;
            } else {
                topicAdvice = `\n\n🌟 作为你「${currentTopic?.label}」的指引，这组牌建议你保持开放心态，顺势而为。`;
            }
        }

        return `三张牌以"${c1.name} → ${c2.name} → ${c3.name}"的叙事线贯穿始终。${tone} 从"${c1.keywords[0]}"出发，经由"${c2.keywords[0]}"的洗礼，最终抵达"${c3.keywords[0]}"的彼岸——这是命运为你编织的独特旅程。请以开放的心态审视每一张牌背后的信息，它们共同构成了当前阶段最重要的灵性指引。${topicAdvice}`;
    }

    function showResult() {
        const overlay = document.getElementById('result-overlay');
        const row = document.getElementById('result-cards-row');
        row.innerHTML = '';

        const cardData = drawnCards.map(m => m.userData);

        // 渲染三张牌卡片
        cardData.forEach((cd, i) => {
            const emojiIdx = LENORMAND_CARDS.findIndex(c => c.id === cd.id);
            const posLabel = POSITIONS[i];
            const itemHTML = `
                <div class="result-card-item" style="animation: fadeInUp 0.4s ${i*0.15}s both;">
                    <div class="position-label">${posLabel}</div>
                    <div class="card-emoji">${CARD_EMOJIS[emojiIdx]}</div>
                    <div class="card-number">NO. ${cd.id}</div>
                    <div class="card-title">${cd.name}</div>
                    <div class="card-keyword">${cd.keywords ? cd.keywords.join(' · ') : ''}</div>
                </div>
            `;
            if (i > 0) row.insertAdjacentHTML('beforeend', '<div class="connector-arrow">→</div>');
            row.insertAdjacentHTML('beforeend', itemHTML);
        });

        // 生成解读
        const reading = generateReading(cardData);
        document.getElementById('read-past').textContent    = reading.past;
        document.getElementById('read-present').textContent = reading.present;
        document.getElementById('read-future').textContent  = reading.future;
        document.getElementById('read-overall').textContent = reading.overall;

        // 更新标题显示场景
        const currentTopic = TOPICS.find(t => t.id === selectedTopic);
        const titleEl = overlay.querySelector('h2');
        if (currentTopic && titleEl) {
            titleEl.innerHTML = `✦ ${currentTopic.icon} ${currentTopic.label} 命运三牌阵 ✦`;
        }

        overlay.classList.add('visible');
    }

    // ─── 重置 ─────────────────────────────────────────────────────────────
    function resetAll() {
        document.getElementById('result-overlay').classList.remove('visible');

        // 移除已抽出的牌 mesh
        drawnCards.forEach(m => scene.remove(m));

    // 生成流沙粒子
    function createSandParticles() {

    // ─── 欢迎引导页（3s 倒计时）────────────────────────────────────────────
    function initIntroScreen() {
        const intro   = document.getElementById('intro-screen');
        const ring    = document.getElementById('intro-ring');
        const numEl   = document.getElementById('intro-num');
        const circumference = 2 * Math.PI * 26; // r=26 => ~163.4

        ring.style.strokeDasharray  = circumference;
        ring.style.strokeDashoffset = circumference;

        const DURATION = 3000; // 3 秒
        const start = performance.now();

        function tick(now) {
            const elapsed = now - start;
            const progress = Math.min(elapsed / DURATION, 1); // 0→1

            // 进度环填充
            ring.style.strokeDashoffset = circumference * (1 - progress);

            // 倒计时数字
            const remaining = Math.ceil((1 - progress) * 3);
            numEl.textContent = remaining > 0 ? remaining : '';

            if (progress < 1) {
                requestAnimationFrame(tick);
            } else {
                // 淡出引导页
                intro.classList.add('fade-out');
                setTimeout(() => { intro.style.display = 'none'; }, 850);
            }
        }

        // 动画稍作延迟，等 CSS 动画入场
        setTimeout(() => requestAnimationFrame(tick), 1000);
    }

    // ─── 流星雨 ───────────────────────────────────────────────────────────
    function initMeteors() {
        const mc = document.getElementById('meteor-canvas');
        mc.width = innerWidth;
        mc.height = innerHeight;
        const ctx = mc.getContext('2d');

        // 每颗流星的参数
        const METEOR_COUNT = 22;
        const meteors = [];

        function randomMeteor(init) {
            // 流星从右上角区域出发，向左下方运动
            // 方向：向左(-x) 向下(+y)，角度约 210°~240°（从正右方逆时针）
            // vx < 0（向左），vy > 0（向下）
            const angleDeg = 210 + Math.random() * 30;  // 210°~240°
            const angleRad = (Math.PI / 180) * angleDeg;
            const speed = 3.5 + Math.random() * 3.0;    // 每帧 3.5~6.5px，明显可见
            const length = 80 + Math.random() * 140;     // 拖尾长度
            const opacity = 0.5 + Math.random() * 0.5;   // 单颗透明度
            // 起点：右侧上方区域（x 在屏幕右半至右侧外，y 在屏幕上方）
            const startX = innerWidth * 0.5 + Math.random() * innerWidth;
            const startY = -length - Math.random() * innerHeight * 0.5;
            const vx = Math.cos(angleRad) * speed; // 负值，向左
            const vy = Math.sin(angleRad) * speed; // 负值！sin(210°~240°) < 0，需要取反
            return {
                x: startX, y: startY,
                vx: vx,
                vy: -vy,  // 翻转 vy，使其向下运动（+y 方向）
                length, opacity,
                colorHead: `rgba(255,240,200,${opacity})`,
                colorTail: `rgba(180,140,60,0)`,
                lineWidth: 0.6 + Math.random() * 1.2,
                delay: init ? Math.floor(Math.random() * 120) : 0
            };
        }

        // 初始填充，让流星均匀散布在各阶段
        for (let i = 0; i < METEOR_COUNT; i++) {
            const m = randomMeteor(false);
            // 初始时让流星分布在屏幕各个位置
            const progress = Math.random();
            const steps = progress * (innerWidth / Math.max(Math.abs(m.vx), 0.1));
            m.x += m.vx * steps;
            m.y += m.vy * steps;
            meteors.push(m);
        }

        function drawMeteors() {
            // 清除：用带透明度的黑色叠加，制造"拖尾残留"消散感
            ctx.clearRect(0, 0, mc.width, mc.height);

            meteors.forEach((m, idx) => {
                if (m.delay > 0) { m.delay--; return; }

                // 推进位置
                m.x += m.vx;
                m.y += m.vy;

                // 超出屏幕下方或左方则重置
                if (m.y > mc.height + m.length || m.x < -m.length) {
                    meteors[idx] = randomMeteor(true);
                    return;
                }

                // 绘制拖尾线段（从尾到头，渐变透明）
                const tailX = m.x - Math.cos(Math.atan2(m.vy, m.vx)) * m.length;
                const tailY = m.y - Math.sin(Math.atan2(m.vy, m.vx)) * m.length;

                const grad = ctx.createLinearGradient(tailX, tailY, m.x, m.y);
                grad.addColorStop(0, m.colorTail);
                grad.addColorStop(1, m.colorHead);

                ctx.save();
                ctx.globalAlpha = 0.2; // 整个层限制在 20% 透明度
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(m.x, m.y);
                ctx.strokeStyle = grad;
                ctx.lineWidth = m.lineWidth;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 头部亮点
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.lineWidth * 0.9, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,248,220,${m.opacity * 1.4})`;
                ctx.fill();
                ctx.restore();
            });

            requestAnimationFrame(drawMeteors);
        }

        drawMeteors();
    }

    // fadeInUp 动画
    const style = document.createElement('style');
    style.textContent = `@keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }`;
    document.head.appendChild(style);
    </script>
</body>
</html>
